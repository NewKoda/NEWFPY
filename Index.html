<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historia de Apoyo</title>
    <!-- Fuentes suaves y redondeadas -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pastel-wrapper">
        
        <!-- Barra de progreso suave -->
        <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Contenedor principal estilo tarjeta anime -->
        <div class="pastel-panel" id="book">
            <div class="page-content" id="page-content">
                <h1 id="page-title" class="title-text">Cargando tu historia...</h1>
                
                <div class="image-frame">
                    <img id="page-image" src="" alt="Ilustración de apoyo">
                </div>
                
                <p id="page-text" class="body-text"></p>
            </div>
        </div>

        <!-- Controles de navegación redondeados -->
        <div class="controls">
            <button id="prev-btn" class="pastel-btn" disabled>&#8592; Atrás</button>
            <button id="autoplay-btn" class="pastel-btn-action">Lectura Automática</button>
            <button id="next-btn" class="pastel-btn">Siguiente &#8594;</button>
        </div>
        
        <div class="status-indicator" id="page-indicator">Página 1 / 4</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
